    <path d="M860 450 L900 700"/>
    <path d="M1400 200 L1280 460"/>
    <path d="M1400 200 L1500 350"/>
    <path d="M1500 350 L1340 720"/>
  </g>

  <!-- accent connecting lines (brighter) -->
  <g stroke="#fbbf24" stroke-opacity="0.5" stroke-width="1.5" fill="none">
    <path d="M320 240 L540 160 L820 280"/>
    <path d="M680 620 L900 700 L1140 660"/>
  </g>

  <!-- nodes -->
  <g filter="url(#glow)">
    <circle cx="120" cy="180" r="4" fill="#c4b5fd"/>
    <circle cx="320" cy="240" r="5" fill="#a78bfa"/>
    <circle cx="540" cy="160" r="4" fill="#c4b5fd"/>
    <circle cx="760" cy="220" r="5" fill="#a78bfa"/>
    <circle cx="240" cy="360" r="3" fill="#c4b5fd"/>
    <circle cx="420" cy="420" r="6" fill="#fbbf24"/>
    <circle cx="640" cy="380" r="4" fill="#a78bfa"/>
    <circle cx="820" cy="280" r="5" fill="#fde68a"/>
    <circle cx="860" cy="450" r="6" fill="#a78bfa"/>
    <circle cx="1080" cy="380" r="4" fill="#c4b5fd"/>
    <circle cx="1280" cy="460" r="7" fill="#fbbf24"/>
    <circle cx="460" cy="580" r="4" fill="#a78bfa"/>
    <circle cx="680" cy="620" r="5" fill="#c4b5fd"/>
    <circle cx="900" cy="700" r="6" fill="#fde68a"/>
