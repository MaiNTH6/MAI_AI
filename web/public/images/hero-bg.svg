<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1600 900" preserveAspectRatio="xMidYMid slice">
  <defs>
    <radialGradient id="g1" cx="20%" cy="30%" r="60%">
      <stop offset="0%" stop-color="#7c3aed" stop-opacity="0.55"/>
      <stop offset="100%" stop-color="#7c3aed" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="g2" cx="80%" cy="70%" r="55%">
      <stop offset="0%" stop-color="#f59e0b" stop-opacity="0.35"/>
      <stop offset="100%" stop-color="#f59e0b" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="g3" cx="55%" cy="50%" r="40%">
      <stop offset="0%" stop-color="#38bdf8" stop-opacity="0.30"/>
      <stop offset="100%" stop-color="#38bdf8" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#1a1f3a"/>
      <stop offset="50%" stop-color="#0f1729"/>
      <stop offset="100%" stop-color="#1e1b4b"/>
    </linearGradient>
    <filter id="glow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <rect width="1600" height="900" fill="url(#bgGrad)"/>
  <rect width="1600" height="900" fill="url(#g1)"/>
  <rect width="1600" height="900" fill="url(#g2)"/>
  <rect width="1600" height="900" fill="url(#g3)"/>

  <!-- subtle grid -->
  <g stroke="#94a3b8" stroke-opacity="0.07" stroke-width="1">
    <path d="M0 75 H1600 M0 150 H1600 M0 225 H1600 M0 300 H1600 M0 375 H1600 M0 450 H1600 M0 525 H1600 M0 600 H1600 M0 675 H1600 M0 750 H1600 M0 825 H1600"/>
    <path d="M100 0 V900 M200 0 V900 M300 0 V900 M400 0 V900 M500 0 V900 M600 0 V900 M700 0 V900 M800 0 V900 M900 0 V900 M1000 0 V900 M1100 0 V900 M1200 0 V900 M1300 0 V900 M1400 0 V900 M1500 0 V900"/>
  </g>

  <!-- neural network connecting lines -->
  <g stroke="#a78bfa" stroke-opacity="0.35" stroke-width="1.2" fill="none">
    <path d="M120 180 L320 240 L540 160 L760 220"/>
    <path d="M320 240 L420 420 L640 380 L860 450"/>
    <path d="M540 160 L640 380 L820 280"/>
    <path d="M760 220 L860 450 L1080 380 L1280 460"/>
    <path d="M820 280 L1080 380"/>
